<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weekly Pay Calculator</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0077ff">

<style>

body{
    font-family: Arial, sans-serif;
    background:#eef2f7;
    margin:0;
    padding:15px;
}

.container{
    max-width:500px;
    margin:auto;
}

h1{
    text-align:center;
}

/* RATE CARD */

.rate-card{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.rate-grid{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.rate-grid input{
    padding:10px;
    font-size:16px;
}

/* DAY CARD */

.day-card{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.day-header{
    font-weight:bold;
    font-size:18px;
    margin-bottom:10px;
}

.field{
    margin-bottom:10px;
}

.field label{
    display:block;
    font-size:14px;
    margin-bottom:4px;
}

input,select{
    width:100%;
    padding:10px;
    font-size:16px;
}

.break-row{
    display:flex;
    gap:10px;
}

.break-row select{
    flex:1;
}

.overtime-toggle{
    display:flex;
    align-items:center;
    gap:8px;
}

/* BUTTON */

.copy-btn{
    background:#0077ff;
    color:white;
    border:none;
    padding:10px;
    border-radius:6px;
    width:100%;
    font-size:15px;
    cursor:pointer;
}

.copy-btn:hover{
    background:#005fd1;
}

/* RESULTS */

.results{
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

</style>

</head>

<body>

<div class="container">

<h1>Weekly Pay</h1>

<div class="rate-card">

<h3>Hourly Rates</h3>

<div class="rate-grid">

<div>
<label>Normal Rate ($)</label>
<input id="normalRate" type="number" value="33.19">
</div>

<div>
<label>Weekend Rate ($)</label>
<input id="weekendRate" type="number" value="38.83">
</div>

<div>
<label>Overtime Rate ($)</label>
<input id="overtimeRate" type="number" value="46.46">
</div>

</div>

</div>

<div id="days"></div>

<div class="results">
<div id="totalHours">Total Hours: 0</div>
<div id="totalPay">Total Pay: $0</div>
</div>

</div>

<script>

const days = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const daysContainer = document.getElementById("days");

function minuteOptions(selected){

let options="";

for(let i=0;i<=55;i+=5){

options+=`<option value="${i}" ${i===selected?"selected":""}>${i}m</option>`;

}

return options;

}

days.forEach((day,i)=>{

let card = `

<div class="day-card">

<div class="day-header">${day}</div>

<button class="copy-btn" onclick="copyLast(${i})">Copy Last Shift</button>

<div class="field">
<label>Start Time</label>
<input type="time" id="start${i}">
</div>

<div class="field">
<label>Finish Time</label>
<input type="time" id="end${i}">
</div>

<div class="field">
<label>Break</label>

<div class="break-row">

<select id="breakH${i}">
<option value="0">0h</option>
<option value="1">1h</option>
<option value="2">2h</option>
</select>

<select id="breakM${i}">
${minuteOptions(30)}
</select>

</div>

</div>

<div class="field overtime-toggle">
<input type="checkbox" id="overtime${i}">
<label>Overtime</label>
</div>

<div class="field">
<label>Hours Worked</label>
<div id="hours${i}">0</div>
</div>

</div>

`;

daysContainer.innerHTML += card;

});

function copyLast(i){

if(i === 0) return;

document.getElementById("start"+i).value =
document.getElementById("start"+(i-1)).value;

document.getElementById("end"+i).value =
document.getElementById("end"+(i-1)).value;

document.getElementById("breakH"+i).value =
document.getElementById("breakH"+(i-1)).value;

document.getElementById("breakM"+i).value =
document.getElementById("breakM"+(i-1)).value;

document.getElementById("overtime"+i).checked =
document.getElementById("overtime"+(i-1)).checked;

calculate();

}

function calculate(){

let normalRate = parseFloat(document.getElementById("normalRate").value) || 0;
let weekendRate = parseFloat(document.getElementById("weekendRate").value) || 0;
let overtimeRate = parseFloat(document.getElementById("overtimeRate").value) || 0;

let totalHours = 0;
let totalPay = 0;

for(let i=0;i<7;i++){

let start = document.getElementById("start"+i).value;
let end = document.getElementById("end"+i).value;

if(!start || !end){

document.getElementById("hours"+i).innerText = "0";
continue;

}

let startTime = new Date("1970-01-01T"+start);
let endTime = new Date("1970-01-01T"+end);

let hours = (endTime - startTime)/1000/60/60;

if(hours < 0) hours += 24;

let breakH = parseInt(document.getElementById("breakH"+i).value);
let breakM = parseInt(document.getElementById("breakM"+i).value);

let breakTime = breakH + (breakM/60);

hours -= breakTime;

if(hours < 0) hours = 0;

document.getElementById("hours"+i).innerText = hours.toFixed(2);

let isWeekend = (i === 5 || i === 6);
let overtime = document.getElementById("overtime"+i).checked;

let rate = normalRate;

if(isWeekend) rate = weekendRate;
if(overtime) rate = overtimeRate;

let pay = hours * rate;

totalHours += hours;
totalPay += pay;

}

document.getElementById("totalHours").innerText =
"Total Hours: " + totalHours.toFixed(2);

document.getElementById("totalPay").innerText =
"Total Pay: $" + totalPay.toFixed(2);

}

function setupAutoCalculate(){

for(let i=0;i<7;i++){

document.getElementById("start"+i).addEventListener("input",calculate);
document.getElementById("end"+i).addEventListener("input",calculate);
document.getElementById("breakH"+i).addEventListener("change",calculate);
document.getElementById("breakM"+i).addEventListener("change",calculate);
document.getElementById("overtime"+i).addEventListener("change",calculate);

}

}

setupAutoCalculate();

/* PWA SERVICE WORKER */

if("serviceWorker" in navigator){

navigator.serviceWorker.register("service-worker.js");

}

</script>

</body>
</html>
