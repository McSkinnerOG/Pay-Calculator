<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weekly Pay Calculator</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0077ff">

<style>

body{
    font-family: Arial, sans-serif;
    background:#eef2f7;
    margin:0;
    padding:15px;
}

.container{
    max-width:500px;
    margin:auto;
}

h1{
    text-align:center;
}

/* RATE CARD */

.rate-card{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.rate-grid{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.rate-grid input{
    padding:10px;
    font-size:16px;
}

/* DAY CARD */

.day-card{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.day-header{
    font-weight:bold;
    font-size:18px;
    margin-bottom:10px;
}

.field{
    margin-bottom:10px;
}

.field label{
    display:block;
    font-size:14px;
    margin-bottom:4px;
}

input,select{
    width:100%;
    padding:10px;
    font-size:16px;
    box-sizing:border-box;
}

.break-row{
    display:flex;
    gap:10px;
}

.break-row select{
    flex:1;
}

.overtime-toggle{
    display:flex;
    align-items:center;
    gap:8px;
}

/* BUTTON */

.copy-btn{
    background:#0077ff;
    color:white;
    border:none;
    padding:10px;
    border-radius:6px;
    width:100%;
    font-size:15px;
    cursor:pointer;
}

.copy-btn:hover{
    background:#005fd1;
}

/* RESULTS */

.results{
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

</style>

</head>

<body>

<div class="container">

<h1>Weekly Pay</h1>

<div class="rate-card">

<h3>Hourly Rates</h3>

<div class="rate-grid">

<div>
<label>Normal Rate ($)</label>
<input id="normalRate" type="number" value="33.19">
</div>

<div>
<label>Weekend Rate ($)</label>
<input id="weekendRate" type="number" value="38.83">
</div>

<div>
<label>Overtime Rate ($) — first 3 hrs</label>
<input id="overtimeRate" type="number" value="46.46">
</div>

<div>
<label>Double-Time Rate ($) — after 3 hrs</label>
<input id="doubleRate" type="number" value="66.38">
</div>

</div>

</div>

<div id="days"></div>

<button class="copy-btn" onclick="calculate()" style="margin-bottom:15px;font-size:17px;padding:14px;">Calculate Pay</button>

<div class="results">
<div id="totalHours">Total Hours: 0</div>
<div id="totalPay">Total Pay: $0</div>
</div>

</div>

<script>
const days = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const daysContainer = document.getElementById("days");
const el = id => document.getElementById(id);

const STORAGE_KEY = "weeklyPayData";

/* ---------- UTIL ---------- */

const minuteOptions = (selected=0)=>{
    let html="";
    for(let i=0;i<=55;i+=5){
        html+=`<option value="${i}" ${i===selected?"selected":""}>${i}m</option>`;
    }
    return html;
};

const getNum = id => parseFloat(el(id).value) || 0;

/* ---------- BUILD UI ---------- */

days.forEach((day,i)=>{

daysContainer.innerHTML+=`

<div class="day-card">

<div class="day-header">${day}</div>

${i ? `<button class="copy-btn" onclick="copyLast(${i})">Copy Last Shift</button>` : ""}

<div class="field">
<label>Start</label>
<input type="time" id="start${i}">
</div>

<div class="field">
<label>Finish</label>
<input type="time" id="end${i}">
</div>

<div class="field">
<label>Break</label>
<div class="break-row">

<select id="breakH${i}">
<option value="0">0h</option>
<option value="1">1h</option>
<option value="2">2h</option>
</select>

<select id="breakM${i}">
${minuteOptions(30)}
</select>

</div>
</div>

<div class="field">
<label>Overtime</label>
<div class="break-row">

<select id="overtimeH${i}">
${[0,1,2,3,4,5,6].map(h=>`<option>${h}</option>`).join("")}
</select>

<select id="overtimeM${i}">
${minuteOptions()}
</select>

</div>
</div>

<div class="field">
<label>Hours Worked</label>
<div id="hours${i}">0</div>
</div>

</div>
`;
});

/* ---------- STORAGE ---------- */

function saveData(){

const data={};

for(let i=0;i<7;i++){

data[i]={
start:el("start"+i).value,
end:el("end"+i).value,
breakH:el("breakH"+i).value,
breakM:el("breakM"+i).value,
overtimeH:el("overtimeH"+i).value,
overtimeM:el("overtimeM"+i).value
};

}

localStorage.setItem(STORAGE_KEY,JSON.stringify(data));

}

function loadData(){

const data=JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");

for(let i=0;i<7;i++){

if(!data[i]) continue;

Object.keys(data[i]).forEach(field=>{
el(field+i).value=data[i][field];
});

}

}

/* ---------- COPY SHIFT ---------- */

function copyLast(i){

if(!i) return;

["start","end","breakH","breakM","overtimeH","overtimeM"].forEach(f=>{
el(f+i).value=el(f+(i-1)).value;
});

saveData();
calculate();

}

/* ---------- CALCULATE ---------- */

function calculate(){

const normalRate=getNum("normalRate");
const weekendRate=getNum("weekendRate");
const overtimeRate=getNum("overtimeRate");
const doubleRate=getNum("doubleRate");

let totalHours=0;
let totalPay=0;

for(let i=0;i<7;i++){

let start=el("start"+i).value;
let end=el("end"+i).value;

if(!start||!end){
el("hours"+i).innerText="0";
continue;
}

let startT=new Date("1970-01-01T"+start);
let endT=new Date("1970-01-01T"+end);

let hours=(endT-startT)/3600000;
if(hours<0) hours+=24;

let breakTime=getNum("breakH"+i)+(getNum("breakM"+i)/60);
hours=Math.max(hours-breakTime,0);

el("hours"+i).innerText=hours.toFixed(2);

let overtime=getNum("overtimeH"+i)+(getNum("overtimeM"+i)/60);

let baseRate=(i>=5)?weekendRate:normalRate;

let regular=Math.max(hours-overtime,0);
let ot=hours-regular;

let ot1=Math.min(ot,3);
let ot2=Math.max(ot-3,0);

let pay=(regular*baseRate)+(ot1*overtimeRate)+(ot2*doubleRate);

totalHours+=hours;
totalPay+=pay;

}

el("totalHours").innerText="Total Hours: "+totalHours.toFixed(2);
el("totalPay").innerText="Total Pay: $"+totalPay.toFixed(2);

saveData();

}

/* ---------- AUTO EVENTS ---------- */

function setupEvents(){

for(let i=0;i<7;i++){

["start","end"].forEach(f=>{
el(f+i).addEventListener("input",calculate);
});

["breakH","breakM","overtimeH","overtimeM"].forEach(f=>{
el(f+i).addEventListener("change",calculate);
});

}

}

setupEvents();
loadData();
calculate();

/* ---------- SERVICE WORKER ---------- */

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
